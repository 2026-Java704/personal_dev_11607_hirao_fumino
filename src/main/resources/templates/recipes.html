
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>トップページ/レシピ一覧</title>
	<link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
	
	<header th:replace="~{header}"></header>
	<span th:text="${@account.name}+'さんがログイン中'"></span>
		<a href="/logout">ログアウト</a>
		
	<hr>
	
	<main>

<!--		</form>-->
		
		<form action="/recipes" class="search-form-3" method="get">
		    <label>
		        <input type="text" name="keyword" th:value="${keyword}" placeholder="キーワード検索">
		    </label>
		    <button type="submit" aria-label="検索"></button>
		</form>
				

        <form>
           <a href="/recipes/add"><button type="button" class="button-61">レシピを投稿する</button></a>
		</form>
		
		<br>
		
		<a href="/recipes">全てのレシピ</a>  
		<a th:each="category : ${categories}"
		   th:href="@{/recipes(categoryId=${category.id})}"
		   th:text="${category.name}"
		   style="margin-right: 10px;"></a>
		
		
<!--		   <div class="tab-3">-->
		       
<!--				   <a th:href="@{/recipes}">全てのレシピ</a> -->

<!--		    </div>-->
<!--		       <div></div>-->

		<br><br>
	
		
		<h2>レシピ一覧</h2>
		
		<p th:if="${#lists.isEmpty(recipes)}">レシピがまだありません。</p>
		
		
		<div th:each="recipe : ${recipes}" style="margin-bottom: 15px;">
			<button class="button-1">
			  <a th:href="@{/recipes/detail/{id}(id=${recipe.id})}" 
			     th:text="${recipe.name}" 
			     style="font-size: 1.2em; font-weight: bold;">レシピ名</a>
			</button>
		</div>

	</main>
	<hr>
	<footer th:replace="~{footer}"></footer>
</body>
</html>
