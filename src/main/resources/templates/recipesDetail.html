<p>みんなのコメント</p>
		
		<div id="comment-area">
			<p th:if="${#lists.isEmpty(comments)}" id="no-comment-msg" style="color: #888; text-align: left; padding-left: 10px;">
				まだコメントはありません。最初のコメントを書いてみませんか？
			</p>
			
			<div th:unless="${#lists.isEmpty(comments)}">
				<div th:each="comment : ${comments}" class="balloon-004" style="margin-bottom: 15px;">
					<div style="text-align: left; font-size: 0.9em; color: #555; font-weight: bold; margin-bottom: 3px; padding-left: 15px;">
						<span th:text="${comment.user.name}">ユーザー名</span> さん
					</div>
					<p th:text="${comment.content}">コメント内容</p>
				</div>
			</div>
		</div>
		
		<div style="margin-top: 30px; text-align: left; background: #fffdf7; padding: 20px; border: 1px solid #ffe0b2; border-radius: 8px;">
			<h4 style="margin-top: 0; color: #333;">コメントを投稿する</h4>
			
			<form id="commentForm" th:action="@{/recipes/detail/{id}/comment(id=${recipe.id})}" method="post">
				<label>
					<span class="textbox-2-label">
						<textarea id="commentInput" name="content" class="textbox-2" style="height: 80px;" placeholder="美味しい工夫や感想を書いてね！"></textarea>
					</span>
				</label>
				<br>
				<button type="submit" class="button-61" style="width: 150px; height: 40px; font-size: 0.9em; margin-top: 10px;">
					コメントを送る
				</button>
			</form>
		</div>

		<script>
		document.getElementById('commentForm').addEventListener('submit', function(event) {
			event.preventDefault(); 
			
			const inputArea = document.getElementById('commentInput');
			const contentText = inputArea.value;
			
			// 空の場合
			if (!contentText.trim()) return;
			
			const url = this.getAttribute('action');
			const formData = new FormData();
			formData.append('content', contentText);
			
			fetch(url, {
				method: 'POST',
				body: formData
			})
			.then(response => response.json())
			.then(data => {
				if (data.success) {
					// コメントされたら「まだコメントはありません」を消す
					const noMsg = document.getElementById('no-comment-msg');
					if (noMsg) {
						noMsg.remove();
					}
					
					//そのままコメントを表示
					const commentArea = document.getElementById('comment-area');
					
					const newCommentHtml = `
						<div class="balloon-004" style="margin-bottom: 15px; animation: fadeIn 0.5s;">
							<div style="text-align: left; font-size: 0.9em; color: #555; font-weight: bold; margin-bottom: 3px; padding-left: 15px;">
								<span>${data.userName}</span> さん
							</div>
							<p>${data.content}</p>
						</div>
					`;
					
					commentArea.insertAdjacentHTML('beforeend', newCommentHtml);
					
					// 入力欄を空にして、次のコメントを書けるようにする
					inputArea.value = '';
				} else {
					alert('コメントの送信に失敗しました。ログイン状態を確認してください。');
				}
			})
			.catch(error => {
				console.error('Error:', error);
				alert('通信エラーが発生しました。');
			});
		});
		</script>
		
		<style>
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}
		</style>
