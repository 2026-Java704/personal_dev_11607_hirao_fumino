<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>レシピ詳細</title>
<link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
	<header th:replace="~{header}"></header>
	
	
	<span th:if="${@account.name != null}" th:text="${@account.name} + 'さんがログイン中'" style="margin-right: 15px; color: #333;"></span>
	<button class="logout">	   
	<a th:if="${@account.name != null}" href="/logout" >ログアウト</a>
	</button>
		   
	  <main>
		<form action="/recipes" class="search-form-3" method="get">
			<label>
			<input type="text" name="keyword" th:value="${keyword}" placeholder="キーワード検索">
			</label>
			<button type="submit" aria-label="検索"></button>
		</form>
		
		<hr>
		
		<h2 th:text="${recipe.name}"></h2>

    <div th:if="${recipe.category != null}" >カテゴリー:
    <span class="category-tag" th:text="${recipe.category.name}">カテゴリー名</span>
     </div>
	 
	 <div th:if="${recipe.user != null}" style="margin: 10px 0; color: #666; font-size: 0.95em;">
	     投稿者: <span th:text="${recipe.user.name}">投稿者名</span> さん
	 </div>

		<br><br>
		<div class="box-009">
		    <div>
		        作り方・手順
		    </div>
			<p style="white-space: pre-wrap;" th:text="${recipe.recipe}"></p>
		</div>
		
		<br>
		
		<div class="detail-action-bar">
		    <form th:action="@{/recipes/edit/{id}(id=${recipe.id})}" method="get">
		        <button type="submit" class="button-54">編集</button>
		    </form>
		    
		    <form th:action="@{/recipes/{id}/delete(id=${recipe.id})}" method="post">
		        <button type="submit" class="button-55">削除</button>
		    </form>
		</div>


		<hr>
					
<p>みんなのコメント</p>
		
		<div id="comment-area">
			<p th:if="${#lists.isEmpty(comments)}" id="no-comment-msg" style="color: #888; text-align: left; padding-left: 10px;">
				まだコメントはありません。最初のコメントを書いてみませんか？
			</p>
			
			<form th:action="@{/recipes/detail/{id}/comment(id=${recipe.id})}" method="post">
			    <div style="text-align: left; margin: 20px 0;">
			        <p style="font-weight: bold; margin-bottom: 5px;">コメントを残す</p>
			        <textarea name="content" rows="3" style="width: 100%; max-width: 500px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;" placeholder="コメントを入力してください"></textarea>
			        <br>
			        <button type="submit" style="background-color: #fdb417; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 5px;">コメントを送信</button>
			    </div>
			</form>

			<hr>

			<div id="comment-area" style="margin-top: 20px;">
			    <h3 style="text-align: left;">コメント一覧</h3>
			    
			    <p th:if="${#lists.isEmpty(commentList)}" style="color: #888; text-align: left;">まだコメントはありません。</p>
			    
			    <div th:each="comment : ${commentList}" class="balloon-004" style="margin-bottom: 15px;">
			        <div style="text-align: left; font-size: 0.9em; color: #555; font-weight: bold; margin-bottom: 3px;">
			            <span th:text="${comment.user != null ? comment.user.name : '名無し'}">ユーザー名</span> さん:
			        </div>
			        <p th:text="${comment.content}" style="text-align: left; margin: 0;"></p>
			    </div>
			</div>

		
		<style>
		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}
		</style>
	
		
	</main>
	<hr>
		<footer th:replace="~{footer}"></footer>

</body>
</html>
